<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta name="description" content="Chen Jia-Zhen — UI/UX and interactive design portfolio.">
    <% var __assetBase = (typeof BASE_URL !== 'undefined' && BASE_URL !== '') ? BASE_URL : '/'; %>
    <meta property="og:image" content="<%= __assetBase %>og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/png" sizes="32x32" href="<%= __assetBase %>favicon-32.png">
    <link rel="icon" type="image/x-icon" href="<%= __assetBase %>favicon.ico">
    <title><%= htmlWebpackPlugin.options.title %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
